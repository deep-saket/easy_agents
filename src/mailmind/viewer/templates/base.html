<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} | mailmind</title>
  <style>
    :root {
      --bg: #f6f3ec;
      --panel: #fffdf8;
      --ink: #1f2933;
      --accent: #0f766e;
      --muted: #6b7280;
      --border: #d6d3d1;
    }
    body { font-family: Georgia, "Times New Roman", serif; margin: 0; background: linear-gradient(180deg, #f4efe4, #faf8f3); color: var(--ink); }
    header, main { max-width: 1100px; margin: 0 auto; padding: 1rem; }
    nav a { margin-right: 1rem; color: var(--accent); text-decoration: none; font-weight: bold; }
    .shell { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.2rem; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05); }
    .item { border-top: 1px solid var(--border); padding: 0.9rem 0; }
    .item:first-child { border-top: 0; }
    .meta { color: var(--muted); font-size: 0.95rem; }
    .tag { display: inline-block; margin-right: 0.45rem; padding: 0.1rem 0.45rem; border-radius: 999px; background: #d1fae5; color: #065f46; font-size: 0.85rem; }
    .search { margin: 1rem 0; display: flex; gap: 0.5rem; }
    input[type="text"] { flex: 1; padding: 0.65rem 0.75rem; border-radius: 10px; border: 1px solid var(--border); background: white; }
    button { padding: 0.65rem 1rem; border-radius: 10px; border: 0; background: var(--accent); color: white; cursor: pointer; }
    pre { white-space: pre-wrap; word-break: break-word; background: #f8fafc; padding: 0.75rem; border-radius: 10px; }
  </style>
</head>
<body>
  <header>
    <h1>mailmind</h1>
    <nav>
      <a href="/">Inbox</a>
      <a href="/emails">Emails</a>
      <a href="/important">Important</a>
      <a href="/search">Search</a>
      <a href="/approvals">Needs Approval</a>
      <a href="/drafts">Drafts</a>
      <a href="/logs">Logs</a>
      <a href="/settings">Settings</a>
    </nav>
  </header>
  <main>
    <section class="shell">
      {% block content %}{% endblock %}
    </section>
  </main>
</body>
</html>
