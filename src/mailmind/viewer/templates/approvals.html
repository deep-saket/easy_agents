{% extends "base.html" %}
{% block content %}
<h2>Needs Approval</h2>
{% for item in approvals %}
<article class="item">
  <h3>{{ item.kind.value }}</h3>
  <div class="meta">status={{ item.status.value }} • created={{ item.created_at }}</div>
  <p>{{ item.reason }}</p>
  <pre>{{ item.payload }}</pre>
</article>
{% else %}
<p>No approvals queued.</p>
{% endfor %}
{% endblock %}
