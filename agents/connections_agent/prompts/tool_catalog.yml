tools:
  - name: case_fetch
    description: Fetch case records from local JSON fixtures.
  - name: case_prioritize
    description: Rank delinquent cases by deterministic priority score.
  - name: contact_attempt
    description: Record one outbound contact attempt.
  - name: customer_verify
    description: Validate challenge answers for customer verification.
  - name: loan_policy_lookup
    description: Retrieve policy constraints for a loan/case.
  - name: dues_explain_build
    description: Build customer-safe dues explanation text.
  - name: offer_eligibility
    description: Evaluate waiver/restructure eligibility.
  - name: payment_link_create
    description: Generate a mock payment link with expiry.
  - name: payment_status_check
    description: Fetch or simulate current payment status.
  - name: promise_capture
    description: Save borrower promise-to-pay details.
  - name: followup_schedule
    description: Schedule follow-up tasks from promises.
  - name: disposition_update
    description: Save disposition code and notes.
  - name: human_escalation
    description: Escalate case to a human queue.
