session_id: mailmind-cli
trigger_type: query
interactive: true
message:
entry_mode: cli
webhook_host: 127.0.0.1
webhook_port: 8000

paths:
  db_path: data/mailmind.duckdb
  log_path: data/logs/audit.jsonl
  policy_path: agents/mailmind/policies/default_policy.yaml
  gmail_seed_path: data/seed/demo_messages.json
  tool_catalog_path: data/tool_catalog.json
  memory_cold_path: data/memory/cold_memories.jsonl
  sleeping_tasks_path: data/memory/sleeping_tasks.jsonl
  memory_tables_path: config/memory_tables.yaml
  memory_policies_path: config/memory_policies.yaml

runtime:
  source_mode: fake
  classifier_mode: rules
  llm_enabled: false
  poll_seconds: 300

llm:
  provider: huggingface
  model_name: Qwen/Qwen3-1.7B
  device_map: auto
  torch_dtype: auto
  max_new_tokens:
  enable_thinking: true

planner:
  enabled: false
  provider: function_gemma
  model_name: google/functiongemma-270m-it
  device_map: auto
  torch_dtype: auto
  max_new_tokens:

memory:
  hot_cache_size: 256
  archive_after_days: 30
  escalation_step_count: 3
  confidence_threshold: 0.5

notifications:
  whatsapp_mode: fake
  whatsapp_allowlist:
    - "+918895551384"
  notification_destination: "+918895551384"

viewer:
  host: 127.0.0.1
  port: 8000

integrations:
  gmail_client_id: ""
  gmail_client_secret: ""
  twilio_account_sid: ""
  twilio_auth_token: ""
  twilio_whatsapp_from: ""
